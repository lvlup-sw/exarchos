name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'src/**'
              - 'package.json'
              - 'tsconfig.json'
              - '.github/workflows/ci.yml'
            mcp:
              - 'plugins/exarchos/servers/exarchos-mcp/**'
              - '.github/workflows/ci.yml'

  test-root:
    name: Root Package
    needs: changes
    if: ${{ needs.changes.outputs.root == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run

  test-mcp-skip:
    name: Exarchos MCP Server
    needs: changes
    if: ${{ needs.changes.outputs.mcp != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "No MCP changes, skipping"

  test-mcp:
    name: Exarchos MCP Server
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2204
    defaults:
      run:
        working-directory: plugins/exarchos/servers/exarchos-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugins/exarchos/servers/exarchos-mcp/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:run
