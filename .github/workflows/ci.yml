name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      root: ${{ steps.filter.outputs.root }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            root:
              - 'src/**'
              - 'package.json'
              - 'tsconfig.json'
              - '.github/workflows/ci.yml'
            mcp:
              - 'servers/exarchos-mcp/**'
              - '.github/workflows/ci.yml'

  test-root:
    name: Root Package
    needs: changes
    if: ${{ needs.changes.outputs.root == 'true' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run

  test-mcp:
    name: Exarchos MCP Server
    needs: changes
    if: ${{ needs.changes.outputs.mcp == 'true' }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: servers/exarchos-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: servers/exarchos-mcp/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:run

  ci-gate:
    name: CI Gate
    runs-on: self-hosted
    needs: [changes, test-root, test-mcp]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "test-root=${{ needs.test-root.result }}"
          echo "test-mcp=${{ needs.test-mcp.result }}"

          if [[ "${{ needs.changes.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "::error::Change detection: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.test-root.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "::error::Root package tests: ${{ needs.test-root.result }}"
            exit 1
          fi
          if [[ "${{ needs.test-mcp.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "::warning::MCP server tests: ${{ needs.test-mcp.result }} (non-blocking — server not live yet)"
          fi

          echo "All checks passed (skipped jobs are OK)"
