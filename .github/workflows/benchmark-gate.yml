name: Benchmark Regression Gate

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'has-benchmarks')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run benchmarks
        run: npm run bench -- --reporter json --outputFile benchmark-results.json

      - name: Check for regressions
        run: bash scripts/check-benchmark-regression.sh --results benchmark-results.json --baselines benchmarks/baselines.json
