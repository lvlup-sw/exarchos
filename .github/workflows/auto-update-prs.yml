name: Auto Update PR Branches
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prs:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });
            for (const pr of pulls.data) {
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                console.log(`Updated PR #${pr.number}`);
                // Dispatch CI on the updated branch — needed because pushes
                // from GITHUB_TOKEN don't trigger pull_request workflows
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'ci.yml',
                  ref: pr.head.ref
                });
                console.log(`Dispatched CI for PR #${pr.number} on ${pr.head.ref}`);
              } catch (e) {
                console.log(`Skipped PR #${pr.number}: ${e.message}`);
              }
            }
