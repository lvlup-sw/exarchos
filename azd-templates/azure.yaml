# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: your-app-name
metadata:
  template: your-app-template@1.0.0

# Terraform as infrastructure provider
infra:
  provider: terraform
  path: ./infra

# Service definitions
services:
  api:
    project: ./src/Api
    host: containerapp
    language: dotnet

# Lifecycle hooks
hooks:
  preprovision:
    shell: bash
    run: ./infra/scripts/preprovision.sh
    interactive: true
    continueOnError: false
  postprovision:
    shell: bash
    run: ./infra/scripts/postprovision.sh
    continueOnError: false
