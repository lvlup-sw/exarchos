# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
tone_instructions: Prioritize technical optimality without being nitpicky.
early_access: true
reviews:
  request_changes_workflow: true
  high_level_summary_instructions: |-
    Provide cumulative summary of entire PR state.
    Do not reference individual commits.
    Focus on: What does this PR accomplish? What issues remain?
  auto_apply_labels: true
  auto_assign_reviewers: true
  path_filters:
    - '!**/*.lock'
    - '!**/package-lock.json'
    - '!**/yarn.lock'
    - '!**/*.generated.*'
    - '!**/dist/**'
    - '!**/node_modules/**'
    - '!**/*.min.js'
  path_instructions:
    - path: '**/*.test.*'
      instructions: Focus on test coverage, assertion quality, and edge cases.
    - path: '**/api/**'
      instructions: 'Prioritize security: auth, input validation, error handling.'
    - path: docs/**
      instructions: Check for accuracy and completeness. Light review only.
  auto_review:
    ignore_usernames:
      - renovate[bot]
  pre_merge_checks:
    custom_checks:
      - mode: error
        name: SPEC COMPLIANCE
        instructions: |-
          ## Spec Compliance Review

          **IMPORTANT:** Do NOT be nitpicky! Only surface legitimately impactful issues!

          Review the ENTIRE PR diff against base branch (cumulative, not incremental).

          ### Output Format (MANDATORY)

          For EACH issue found, use this exact format:

          ```
          🔴 Critical | 🟠 Major | 🟡 Minor
          **File:** `path/to/file.ext:LINE`
          **Issue:** [Clear description of what's wrong]
          **Expected:** [What the spec/design requires]
          **Fix:** [Specific action to remediate]
          ```

          ### Severity Definitions

          - 🔴 **Critical**: Missing required functionality, behavior differs from spec
          - 🟠 **Major**: Untested public API, incomplete edge case handling
          - 🟡 **Minor**: Test naming convention, documentation gaps

          ### Checklist (verify each, report deviations)

          - [ ] All specified requirements implemented
          - [ ] No scope creep (unspecified features)
          - [ ] Tests exist for each feature
          - [ ] Test names: `Method_Scenario_Outcome`
          - [ ] Coverage: >90% line, >70% branch

          ### Deterministic Criteria

          Same code state MUST produce same verdict. Do not:
          - Reference previous reviews or comments
          - Change assessment based on commit count
          - Provide different feedback for same code

          ### Summary Table (REQUIRED)

          | Severity | Count | Items |
          |----------|-------|-------|
          | 🔴 Critical | N | [Brief list] |
          | 🟠 Major | N | [Brief list] |
          | 🟡 Minor | N | [Brief list] |

          ### Verdict

          **Status:** PASS | FAIL

          - PASS: No 🔴 Critical issues, ≤2 🟠 Major issues
          - FAIL: Any 🔴 Critical OR >2 🟠 Major issues

          **Missing:** [list or "None"]
          **Untested:** [list or "None"]
          **Scope Creep:** [list or "None"]
      - mode: error
        name: CODE QUALITY
        instructions: |-
          ## Code Quality Review

          **IMPORTANT:** Do NOT be nitpicky! Only surface legitimately impactful issues!

          Review the ENTIRE PR diff (cumulative state, not incremental commits).
          Assumes spec compliance has passed.

          ### Output Format (MANDATORY)

          For EACH issue, use this exact format:

          ```
          🔴 Critical | 🟠 Major | 🟡 Minor
          **File:** `path/to/file.ext:LINE`
          **Category:** Security | Performance | SOLID | Error Handling | Style
          **Issue:** [Clear description]
          **Current:** [What the code does now]
          🔎 **Proposed fix:**
          [Specific code or action to remediate]
          ```

          ### Severity Definitions

          #### 🔴 Critical (MUST fix before merge)
          - Security: SQL injection, XSS, secrets in code
          - Data loss risks, unhandled crashes
          - Missing await (floating promises)

          #### 🟠 Major (SHOULD fix)
          - SOLID violations (god classes, tight coupling)
          - Functions >30 lines, deep nesting
          - N+1 queries, O(n²) when O(n) works
          - Copy-paste duplication (DRY violations)

          #### 🟡 Minor (NICE to have)
          - Naming improvements
          - Minor refactoring
          - Documentation suggestions

          ### Idempotency Rules

          1. Review full PR diff, not commit-by-commit
          2. Same code = same findings (deterministic)
          3. Don't reference previous CodeRabbit comments
          4. Base verdict on current code state only

          ### Summary Table (REQUIRED)

          | Severity | Category | File:Line | Issue |
          |----------|----------|-----------|-------|
          | 🔴 | Security | `src/api.ts:42` | SQL injection |
          | 🟠 | SOLID | `src/service.ts:100` | God class |

          ### Verdict

          **Status:** APPROVED | NEEDS_FIXES | BLOCKED

          🔴 Critical: [N] | 🟠 Major: [N] | 🟡 Minor: [N]

          - **APPROVED**: 0 🔴 Critical AND ≤3 🟠 Major
          - **NEEDS_FIXES**: Any 🔴 Critical OR >3 🟠 Major
          - **BLOCKED**: Architectural flaw requiring redesign
